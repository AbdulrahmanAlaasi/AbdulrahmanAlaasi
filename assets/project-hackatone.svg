<svg width="760" height="320" viewBox="0 0 760 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hackatone project card</title>
  <desc id="desc">A web and mobile hackathon management platform project card.</desc>
  <rect width="760" height="320" rx="18" fill="#F8DFAE"/>
  <rect x="56" y="34" width="220" height="252" rx="28" fill="#332820"/>
  <rect x="72" y="58" width="188" height="204" rx="18" fill="#FFF9ED"/>
  <circle cx="166" cy="274" r="5" fill="#F4EDE0"/>
  <text x="316" y="82" font-family="'Courier New', monospace" font-size="18" fill="#B65341">// web + mobile platform</text>
  <text x="316" y="128" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#2C241D">Hackatone</text>
  <text x="318" y="166" font-family="Georgia, serif" font-size="22" fill="#4A3B30">Hackathon registration, QR check-in,</text>
  <text x="318" y="194" font-family="Georgia, serif" font-size="22" fill="#4A3B30">submissions, judging, and winners.</text>
  <rect x="94" y="86" width="144" height="22" rx="11" fill="#CF594A">
    <animate attributeName="width" values="100;144;100" dur="3.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="94" y="126" width="112" height="18" rx="9" fill="#7A9B77">
    <animate attributeName="width" values="76;112;76" dur="3.6s" begin=".35s" repeatCount="indefinite"/>
  </rect>
  <rect x="94" y="160" width="132" height="18" rx="9" fill="#5D7FA3">
    <animate attributeName="width" values="92;132;92" dur="3.6s" begin=".7s" repeatCount="indefinite"/>
  </rect>
  <rect x="94" y="204" width="144" height="34" rx="17" fill="#332820"/>
  <text x="334" y="236" font-family="'Courier New', monospace" font-size="17" fill="#332820">Organizer dashboard + participant app</text>
</svg>
