<svg width="760" height="320" viewBox="0 0 760 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yamamer AI Assistant project card</title>
  <desc id="desc">A stylized dashboard card for a RAG university assistant.</desc>
  <rect width="760" height="320" rx="18" fill="#E8F0DC"/>
  <rect x="32" y="30" width="696" height="260" rx="13" fill="#FFF9ED" stroke="#332820" stroke-width="3"/>
