  <text x="58" y="122" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#2C241D">Yamamer AI Assistant</text>
  <text x="60" y="158" font-family="Georgia, serif" font-size="21" fill="#4A3B30">RAG assistant for academic workflows,</text>
  <text x="60" y="184" font-family="Georgia, serif" font-size="21" fill="#4A3B30">knowledge search, and student support.</text>
